<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prompt Copier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            color: #58a6ff;
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #8b949e;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #c9d1d9;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: #238636;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background-color: #2ea043;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background-color: rgba(218, 54, 51, 0.15);
            border: 1px solid rgba(218, 54, 51, 0.4);
            color: #f85149;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Prompt Copier</h1>
                <p>Sign in to continue</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login" id="login-btn">Sign in</button>
            </form>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="#" id="forgot-link" onclick="handleForgot(event)" style="color: #58a6ff; font-size: 0.825rem; text-decoration: none;">
                    Forgot credentials?
                </a>
            </div>
            <div id="forgot-message" style="display: none; margin-top: 0.75rem; padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; text-align: center;"></div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-message');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.classList.remove('visible');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.classList.add('visible');
                }
            } catch (error) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        }

        async function handleForgot(e) {
            e.preventDefault();
            const msgEl = document.getElementById('forgot-message');
            const link = document.getElementById('forgot-link');

            link.style.pointerEvents = 'none';
            link.style.opacity = '0.5';
            msgEl.style.display = 'none';

            try {
                const res = await fetch('/api/forgot-credentials', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    msgEl.style.display = 'block';
                    msgEl.style.backgroundColor = 'rgba(35, 134, 54, 0.15)';
                    msgEl.style.border = '1px solid rgba(35, 134, 54, 0.4)';
                    msgEl.style.color = '#3fb950';
                    msgEl.textContent = 'Reset link sent! Check your email inbox.';
                } else {
                    msgEl.style.display = 'block';
                    msgEl.style.backgroundColor = 'rgba(218, 54, 51, 0.15)';
                    msgEl.style.border = '1px solid rgba(218, 54, 51, 0.4)';
                    msgEl.style.color = '#f85149';
                    msgEl.textContent = data.error || 'Could not send reset email.';
                }
            } catch (error) {
                msgEl.style.display = 'block';
                msgEl.style.backgroundColor = 'rgba(218, 54, 51, 0.15)';
                msgEl.style.border = '1px solid rgba(218, 54, 51, 0.4)';
                msgEl.style.color = '#f85149';
                msgEl.textContent = 'Connection error. Please try again.';
            } finally {
                link.style.pointerEvents = '';
                link.style.opacity = '';
            }
        }
    </script>
</body>
</html>
